<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExKey — 關鍵人脈媒合平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #4A2D8F 0%, #2E1B5C 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .logo {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .logo span { color: #D4AF37; }
    .tagline {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }
    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 16px;
      padding: 32px 24px;
      backdrop-filter: blur(10px);
    }
    .title { font-size: 20px; font-weight: 500; margin-bottom: 12px; }
    .desc { font-size: 14px; opacity: 0.8; line-height: 1.7; margin-bottom: 24px; }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #D4AF37, #E6C157);
      color: #3D2E00;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Ex<span>Key</span></div>
    <div class="tagline">沒關係 找 關係 的關鍵人脈網</div>
    <div class="card">
      <div class="title">🚧 網站建置中</div>
      <div class="desc">業務 × 廠商的智慧媒合平台<br>即將為您呈現全新體驗</div>
      <div class="badge">Coming Soon</div>
    </div>
    <div class="footer">© 2026 ExKey Lab</div>
  </div>
</body>
</html>
